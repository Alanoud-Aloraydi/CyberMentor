name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        # The suite targets mcp_server.py, which only needs the MCP SDK.
        # (The heavier google-adk / streamlit deps are only needed to run
        # the full app, not to test the security-critical server module.)
        run: |
          python -m pip install --upgrade pip
          pip install "mcp>=1.0.0" pytest

      - name: Run tests
        run: pytest -q
